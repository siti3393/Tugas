<!doctype html>
<html lang="id">
  <head>
    <meta name="author" content="Bagus Uswanto" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Informasi Bahan Ajar | SITTA</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body class="stok-body">
    <div class="stok-container">
      <h1><i class="fas fa-book"></i> Informasi Bahan Ajar</h1>

      <table id="tabelStok">
        <thead>
          <tr>
            <th>Kode Lokasi</th>
            <th>Kode Barang</th>
            <th>Nama Barang</th>
            <th>Jenis</th>
            <th>Edisi</th>
            <th>Stok</th>
            <th>Cover</th>
          </tr>
        </thead>
        <tbody id="tabelBody"></tbody>
      </table>

      <button
        class="add-btn"
        onclick="
          const formTambah = document.getElementById('formTambah');
          formTambah.style.display = 'block';
          const btnModalCancel = document.getElementById('modalCancel');
          btnModalCancel.textContent = 'Batal';
          const btnModalOk = document.getElementById('modalOk');
          btnModalOk.style.display = 'none';

          showModal({
            title: 'Tambah Stok',
            description: 'Tambah barang sekarang',
            onOk: () => {},
          });
        "
      >
        <i class="fas fa-plus-circle"></i> Tambah Data
      </button>

      <button
        class="back-btn"
        onclick="window.location.href = 'dashboard.html'"
      >
        <i class="fa-arrow-left fas"></i> Kembali ke Dashboard
      </button>
    </div>

    <!-- 🟦 Modal Tambah Data -->
    <div id="customModal" class="modal-overlay">
      <div class="modal-box">
        <h2 id="modalTitle">Title</h2>
        <p id="modalDesc">Deskripsi</p>
        <form id="formTambah" onsubmit="simpanData(event)">
          <input
            type="text"
            id="kodeLokasi"
            placeholder="Kode Lokasi"
            required
          />
          <input
            type="text"
            id="kodeBarang"
            placeholder="Kode Barang"
            required
          />
          <input
            type="text"
            id="namaBarang"
            placeholder="Nama Barang"
            required
          />
          <input
            type="text"
            id="jenisBarang"
            placeholder="Jenis Barang"
            required
          />
          <input type="text" id="edisi" placeholder="Edisi" required />
          <input
            type="number"
            id="stok"
            placeholder="Jumlah Stok"
            min="0"
            required
          />
          <button type="submit" class="save-btn">Simpan</button>
        </form>
        <button id="modalCancel" class="save-btn">Batal</button>
        <button id="modalOk" class="btn-ok">Ok</button>
      </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
